<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gesture Particle Universe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: rgb(5, 5, 16);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 20;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            background: rgba(8, 8, 18, 0.5);
            padding: 14px 20px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            letter-spacing: 0.2px;
            max-width: 360px;
        }

        h1 {
            font-weight: 500;
            font-size: 1.6rem;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, rgb(255, 255, 255), rgb(176, 170, 255));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        #gesture-text {
            font-size: 1.1rem;
            margin: 4px 0 10px 0;
            font-weight: 400;
            color: #ffe082;
            text-shadow: 0 0 15px rgba(255, 200, 80, 0.6);
            border-left: 3px solid #ffaa33;
            padding-left: 12px;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 15px;
            font-size: 0.85rem;
            color: rgb(204, 204, 255);
            margin-top: 4px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key {
            display: inline-block;
            background: rgba(240, 200, 140, 0.15);
            border: 1px solid rgba(255, 180, 100, 0.5);
            border-radius: 30px;
            padding: 2px 12px;
            font-weight: 500;
            color: rgb(255, 217, 163);
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            font-size: 0.8rem;
        }

        #preview-card {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 200px;
            z-index: 30;
            background: rgba(12, 12, 22, 0.6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 35px -12px black;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            overflow: hidden;
        }

        #preview-card.collapsed {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            pointer-events: none;
        }

        #preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 6px 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        #preview-header span {
            text-transform: uppercase;
            opacity: 0.7;
        }

        #toggle-preview {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.2s;
            pointer-events: auto;
        }

        #toggle-preview:hover {
            background: rgba(255, 215, 100, 0.3);
            border-color: rgb(255, 187, 85);
        }

        #video-preview {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 18px;
            padding: 0 12px 12px 12px;
            box-sizing: border-box;
            transform: scaleX(-1);
            object-fit: cover;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .glow-note {
            position: fixed;
            bottom: 24px;
            left: 24px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 14px;
            border-radius: 40px;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15;
        }

        .badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            color: rgb(170, 170, 255);
            font-size: 0.75rem;
            border: 1px solid rgba(255, 215, 140, 0.3);
            z-index: 25;
            pointer-events: none;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="ui">
        <h1>Particle lab</h1>
        <p id="gesture-text">⌛ awaiting camera</p>
        <div class="legend-grid">
            <div class="legend-item"><span class="key">1</span>heart</div>
            <div class="legend-item"><span class="key">2</span>flower</div>
            <div class="legend-item"><span class="key">3</span>saturn</div>
            <div class="legend-item"><span class="key">4+</span>solar</div>
            <div class="legend-item"><span class="key">✊</span>fireworks</div>
            <div class="legend-item"><span class="key">👆</span>tilt spin</div>
        </div>
    </div>

    <div id="preview-card">
        <div id="preview-header">
            <span>📷 CAM FEED</span>
            <button id="toggle-preview">hide</button>
        </div>
        <canvas id="video-preview"></canvas>
    </div>

    <video id="input_video" style="display: none"></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        (function () {
            const gestureText = document.getElementById('gesture-text');
            const videoElement = document.getElementById('input_video');
            const previewCanvas = document.getElementById('video-preview');
            const previewCtx = previewCanvas.getContext('2d');
            const previewCard = document.getElementById('preview-card');
            const toggleBtn = document.getElementById('toggle-preview');

            let previewVisible = true;
            toggleBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                previewVisible = !previewVisible;
                if (previewVisible) {
                    previewCard.classList.remove('collapsed');
                    toggleBtn.textContent = 'hide';
                } else {
                    previewCard.classList.add('collapsed');
                    toggleBtn.textContent = 'show';
                }
            });

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.0025);

            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 75);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(1, 1, 1);
            scene.add(light);

            const count = 20000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const targets = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const r = 40 * Math.cbrt(Math.random());
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);

                targets[i * 3] = positions[i * 3];
                targets[i * 3 + 1] = positions[i * 3 + 1];
                targets[i * 3 + 2] = positions[i * 3 + 2];

                const hue = (i / count + 0.5) % 1.0;
                const saturation = 0.9;
                const lightness = 0.6 + 0.3 * Math.sin(i * 0.01);
                const chroma = (1 - Math.abs(2 * lightness - 1)) * saturation;
                const huePrime = hue * 6;
                const x = chroma * (1 - Math.abs((huePrime % 2) - 1));
                let r1, g1, b1;
                if (huePrime < 1) { r1 = chroma; g1 = x; b1 = 0; }
                else if (huePrime < 2) { r1 = x; g1 = chroma; b1 = 0; }
                else if (huePrime < 3) { r1 = 0; g1 = chroma; b1 = x; }
                else if (huePrime < 4) { r1 = 0; g1 = x; b1 = chroma; }
                else if (huePrime < 5) { r1 = x; g1 = 0; b1 = chroma; }
                else { r1 = chroma; g1 = 0; b1 = x; }
                const m = lightness - chroma / 2;
                colors[i * 3] = r1 + m;
                colors[i * 3 + 1] = g1 + m;
                colors[i * 3 + 2] = b1 + m;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.45,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);

            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(3000 * 3);
            for (let i = 0; i < 3000; i++) {
                starPos[i * 3] = (Math.random() - 0.5) * 400;
                starPos[i * 3 + 1] = (Math.random() - 0.5) * 400;
                starPos[i * 3 + 2] = (Math.random() - 0.5) * 400 - 100;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, blending: THREE.AdditiveBlending });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            function setHeart() {
                for (let i = 0; i < count; i++) {
                    const t = Math.random() * Math.PI * 2;
                    const scale = 2.0;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                    targets[i * 3] = scale * x * 0.9 + (Math.random() - 0.5) * 3.5;
                    targets[i * 3 + 1] = scale * y * 0.9 + (Math.random() - 0.5) * 3.5;
                    targets[i * 3 + 2] = (Math.random() - 0.5) * 8;
                }
            }

            function setFlower() {
                for (let i = 0; i < count; i++) {
                    const t = Math.random() * Math.PI * 2;
                    const r = 20 * Math.cos(5 * t);
                    targets[i * 3] = r * Math.cos(t) + (Math.random() - 0.5) * 2;
                    targets[i * 3 + 1] = r * Math.sin(t) + (Math.random() - 0.5) * 2;
                    targets[i * 3 + 2] = (Math.random() - 0.5) * 5;
                }
            }

            function setSaturn() {
                for (let i = 0; i < count; i++) {
                    if (i < count * 0.7) {
                        const phi = Math.acos(2 * Math.random() - 1);
                        const theta = Math.random() * Math.PI * 2;
                        const rad = 12 + Math.random() * 3;
                        targets[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
                        targets[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta) * 0.6;
                        targets[i * 3 + 2] = rad * Math.cos(phi);
                    } else {
                        const angle = Math.random() * Math.PI * 2;
                        const ringR = 22 + Math.random() * 6;
                        targets[i * 3] = ringR * Math.cos(angle);
                        targets[i * 3 + 1] = (Math.random() - 0.5) * 2.5;
                        targets[i * 3 + 2] = ringR * Math.sin(angle);
                    }
                }
            }

            function setSolarSystem() {
                for (let i = 0; i < count; i++) {
                    const rnd = Math.random();
                    if (rnd < 0.2) {
                        const phi = Math.acos(2 * Math.random() - 1);
                        const theta = Math.random() * Math.PI * 2;
                        const rad = 5 + Math.random() * 4;
                        targets[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
                        targets[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta);
                        targets[i * 3 + 2] = rad * Math.cos(phi);
                    } else {
                        const orbit = Math.floor(Math.random() * 4) + 1;
                        const orbitRad = orbit * 14 + 5;
                        const angle = Math.random() * Math.PI * 2;
                        targets[i * 3] = orbitRad * Math.cos(angle) + (Math.random() - 0.5) * 2;
                        targets[i * 3 + 1] = (Math.random() - 0.5) * 3;
                        targets[i * 3 + 2] = orbitRad * Math.sin(angle) + (Math.random() - 0.5) * 2;
                    }
                }
            }

            function setFireworks() {
                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const dist = 80 + Math.random() * 60;
                    targets[i * 3] = dist * Math.sin(phi) * Math.cos(theta);
                    targets[i * 3 + 1] = dist * Math.sin(phi) * Math.sin(theta);
                    targets[i * 3 + 2] = dist * Math.cos(phi);
                }
            }

            function setDefault() {
                for (let i = 0; i < count; i++) {
                    const r = 35 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    targets[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    targets[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    targets[i * 3 + 2] = r * Math.cos(phi);
                }
            }
            setDefault();

            let isFist = false;
            let targetRotationY = 0;
            let currentShape = 'default';

            function drawPreview() {
                if (videoElement.readyState >= 2 && previewCanvas) {
                    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
                    previewCtx.save();
                    previewCtx.scale(-1, 1);
                    previewCtx.drawImage(videoElement, -previewCanvas.width, 0, previewCanvas.width, previewCanvas.height);
                    previewCtx.restore();
                }
                requestAnimationFrame(drawPreview);
            }

            const hands = new Hands({ locateFile: function (file) { return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`; } });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

            hands.onResults(function (results) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const hand = results.multiHandLandmarks[0];

                    function isFingerUp(tip, pip) {
                        return hand[tip].y < hand[pip].y;
                    }

                    const fingersNoThumb = [
                        isFingerUp(8, 6),
                        isFingerUp(12, 10),
                        isFingerUp(16, 14),
                        isFingerUp(20, 18)
                    ];

                    let countUp = 0;
                    for (let i = 0; i < fingersNoThumb.length; i++) {
                        if (fingersNoThumb[i]) countUp++;
                    }

                    targetRotationY = (hand[5].x - hand[0].x) * 6;

                    let fistDetected = true;
                    for (let i = 0; i < fingersNoThumb.length; i++) {
                        if (fingersNoThumb[i]) {
                            fistDetected = false;
                            break;
                        }
                    }
                    if (fistDetected && hand[4].y <= hand[3].y) {
                        fistDetected = false;
                    }

                    if (fistDetected) {
                        if (!isFist) {
                            setFireworks();
                            currentShape = 'fireworks';
                        }
                        gestureText.innerText = '💥 FIREWORKS BURST';
                        isFist = true;
                    } else {
                        isFist = false;
                        if (countUp === 0) {
                            if (currentShape !== 'default') {
                                setDefault();
                                currentShape = 'default';
                            }
                            gestureText.innerText = '✨ nebula cloud';
                        } else if (countUp === 1) {
                            if (currentShape !== 'heart') {
                                setHeart();
                                currentShape = 'heart';
                            }
                            gestureText.innerText = '❤️ heart nebula';
                        } else if (countUp === 2) {
                            if (currentShape !== 'flower') {
                                setFlower();
                                currentShape = 'flower';
                            }
                            gestureText.innerText = '🌸 flower spiral';
                        } else if (countUp === 3) {
                            if (currentShape !== 'saturn') {
                                setSaturn();
                                currentShape = 'saturn';
                            }
                            gestureText.innerText = '🪐 saturn ring';
                        } else if (countUp >= 4) {
                            if (currentShape !== 'solar') {
                                setSolarSystem();
                                currentShape = 'solar';
                            }
                            gestureText.innerText = '🌌 solar system';
                        }
                    }
                } else {
                    targetRotationY = 0;
                }
            });

            const cameraUtil = new Camera(videoElement, {
                onFrame: async function () {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            cameraUtil.start();

            previewCanvas.width = 200;
            previewCanvas.height = 150;
            drawPreview();

            function animate() {
                requestAnimationFrame(animate);
                const posAttr = geometry.attributes.position;
                const posArray = posAttr.array;
                for (let i = 0; i < count * 3; i++) {
                    posArray[i] += (targets[i] - posArray[i]) * 0.08;
                }
                posAttr.needsUpdate = true;

                points.rotation.y += (targetRotationY - points.rotation.y) * 0.03 + 0.0015;
                stars.rotation.y += 0.0001;

                if (isFist) {
                    material.size = 0.9 + Math.random() * 1.2;
                } else {
                    material.size = 0.45 + 0.1 * Math.sin(Date.now() * 0.003);
                }

                camera.position.x = Math.sin(Date.now() * 0.0005) * 8;
                camera.position.y = 12 + Math.sin(Date.now() * 0.0007) * 4;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', function () {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setTimeout(function () {
                if (gestureText.innerText.indexOf('awaiting') !== -1) {
                    gestureText.innerText = '👋 show hand to begin';
                }
            }, 3000);
        })();
    </script>
</body>

</html>
